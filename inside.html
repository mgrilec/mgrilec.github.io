<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inside</title>
    <link rel="stylesheet" href="inside.css" />
  </head>
  <body>
    <main class="container">
      <h1>Inside</h1>
      <button id="openCarelaButton" type="button">Open Carela</button>
      <p id="status" aria-live="polite">Waiting for message from Carela...</p>
    </main>

    <script>
      const button = document.getElementById("openCarelaButton");
      const status = document.getElementById("status");
      const defaultTitle = document.title;
      let flashIntervalId = null;
      let flashState = false;

      const stopFlashUntilFocused = () => {
        if (flashIntervalId === null) {
          return;
        }

        clearInterval(flashIntervalId);
        flashIntervalId = null;
        flashState = false;
        document.title = defaultTitle;
        document.body.classList.remove("needs-focus", "attention-flash");
      };

      const startFlashUntilFocused = () => {
        if (flashIntervalId !== null) {
          return;
        }

        document.body.classList.add("needs-focus");
        flashIntervalId = setInterval(() => {
          flashState = !flashState;
          document.body.classList.toggle("attention-flash", flashState);
          document.title = flashState ? "(Back to Inside) " + defaultTitle : defaultTitle;
        }, 450);
      };

      button.addEventListener("click", () => {
        const newTab = window.open("carela.html", "_blank");

        if (newTab) {
          status.textContent = "Carela opened in a new tab.";
        } else {
          status.textContent = "Popup blocked. Please allow popups for this site.";
        }
      });

      window.addEventListener("message", (event) => {
        if (event.data === "focus") {
          window.focus();
          startFlashUntilFocused();

          if (document.hasFocus()) {
            stopFlashUntilFocused();
            status.textContent = "Focus message received from Carela.";
          } else {
            status.textContent = "Focus requested. Flashing until this tab is focused.";
          }
        }
      });

      window.addEventListener("focus", () => {
        if (flashIntervalId !== null) {
          stopFlashUntilFocused();
          status.textContent = "Inside is focused.";
        }
      });
    </script>
  </body>
</html>
